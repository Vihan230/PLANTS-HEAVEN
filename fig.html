    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <title>PLANTS HEAVEN</title>
</head>


<body>    <!--FIG PRODUCT PAGE-->
    <div id="section-product-page">
        <div class="carousel">

            <input type="radio" name="slider" id="slide1" checked>
            <input type="radio" name="slider" id="slide2">
            <input type="radio" name="slider" id="slide3">

            <div class="slides">
                <div class="slide">
                    <img src="https://cdn.shopify.com/s/files/1/0585/5343/4263/files/ficus-carica-petite-negra.jpg?v=1632400352" alt="">
                </div>

                <div class="slide">
                    <img src="https://media.gardenista.com/wp-content/uploads/2020/10/little-miss-figgy-tree-fast-growing-trees-733x733.jpg" alt="">
                </div>

                <div class="slide">
                    <img src="https://www.agrifarming.in/wp-content/uploads/2022/04/Boost-Fig-Fruit-Yield1-1024x768.jpg" alt="">
                </div>
            </div>

            <div class="dots">
                <label for="slide1"></label>
                <label for="slide2"></label>
                <label for="slide3"></label>
            </div>

        </div>

        <div class="product-buy-details">
            <h1 class="product-buy-heading">FIG</h1>
            <P> Ancient fruit offering honeyed bites of softness.</P>
            <pre>Fig Plant Requirements (Very Short)
            Climate: Tropical & subtropical
            Temperature: 15°C – 30°C
            Location: Sunny, well-drained soil
            Water Need: Low to moderate; occasional watering, drought-tolerant</pre>
            <div class="purchase-buttons d-flex flex-row">
                <button class="buy-button">Buy Now</button>
                <button class="cart-button">Add to Cart</button>
            </div>
        </div>
    </div>
    <script src="carousel.js"></script>

</body>

</html>
